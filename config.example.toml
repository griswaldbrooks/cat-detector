# Cat Detector Configuration
# Copy this file to config.toml and adjust settings as needed

[camera]
# Path to the webcam device ("auto" to detect automatically)
device_path = "auto"
# Frame dimensions
frame_width = 640
frame_height = 480
# Frames per second (affects detection frequency)
fps = 30

[detector]
# Path to the ONNX model file
# clip_vitb32_image.onnx (336MB, 224x224) - CLIP zero-shot, ~21ms, best overhead accuracy (recommended)
# yolo11n.onnx (11MB, 640x640) - YOLO detection, ~25ms, good for side-angle views
# yolo11s.onnx (38MB, 640x640) - better accuracy, ~60ms inference
# yolox_s.onnx (35MB, 640x640) - legacy, ~70ms inference
model_path = "models/clip_vitb32_image.onnx"
# Model input size (640 for YOLO models, ignored for CLIP)
input_size = 640
# Minimum confidence score for detection (0.0 - 1.0)
confidence_threshold = 0.5
# COCO class ID for cat (15 is the standard)
cat_class_id = 15
# Model format: "auto" (detect from filename), "yolox", "yolo11", "clip"
model_format = "clip"
# Path to CLIP text embeddings (required when model_format = "clip")
# Defaults to clip_text_embeddings.bin in the same directory as the model
# text_embeddings_path = "models/clip_text_embeddings.bin"

[storage]
# Directory where captured images will be saved
output_dir = "captures"
# Image format: "jpg" or "png"
image_format = "jpg"
# JPEG quality (1-100, only used if format is jpg)
jpeg_quality = 85

[notification]
# Enable/disable Signal notifications
enabled = false
# Path to signal-cli executable (optional, defaults to /usr/local/bin/signal-cli)
# signal_cli_path = "/usr/local/bin/signal-cli"
# Phone number to send notifications to (required if enabled)
# recipient = "+1234567890"
# Send notification when cat enters
notify_on_enter = true
# Send notification when cat exits
notify_on_exit = true

[tracking]
# How often to save sample images while cat is present (seconds)
sample_interval_secs = 10
# Number of consecutive detections required to confirm cat entered
enter_threshold = 3
# Number of consecutive non-detections required to confirm cat left
exit_threshold = 5
# Milliseconds between detection checks
detection_interval_ms = 500

[web]
# Enable web dashboard for live monitoring
enabled = true
# Address to bind the web server (0.0.0.0 for all interfaces)
bind_address = "0.0.0.0"
# Port for the web dashboard
port = 8080
# Frames per second for the live stream (1-30, lower = less bandwidth)
stream_fps = 5
